version: "3.8"

# Soketi WebSocket server cho dev/staging — Pusher protocol drop-in.
# Chạy: docker compose -f docker-compose.soketi.yml up -d
# Test:  npx wscat -c ws://localhost:6001/app/local-key
services:
  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    container_name: bks_soketi
    restart: unless-stopped
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID:-local-app}"
      SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY:-local-key}"
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET:-local-secret}"
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "false"
      SOKETI_DEFAULT_APP_ENABLED: "true"
      SOKETI_METRICS_ENABLED: "true"
