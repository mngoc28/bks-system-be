services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bks-system-app
    restart: unless-stopped
    # volumes:
    #   - .:/var/www
    environment:
      - APP_ENV=develop
      - APP_DEBUG=true
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
    networks:
      - bks-system-network
    command: php-fpm

  nginx:
    # image: nginx:1.26.1
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    container_name: nginx
    restart: unless-stopped
    # volumes:
    #   - .:/var/www
    #   - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    networks:
      - bks-system-network

  # redis:
  #   image: redis:alpine
  #   container_name: redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - go-edu-network

networks:
  bks-system-network:
    driver: bridge
